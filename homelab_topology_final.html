<script>
const state = { hw: true, sw: true, visor: true, access: true, opt: true };
const groups = {
  hw:     ['hw-sentinel','hw-forge','hw-nexus','hw-citadel','hw-argus','hw-vault','hw-jetkvm'],
  sw:     ['sw-sentinel','sw-forge','sw-nexus','sw-citadel','sw-argus','sw-vault','sw-jetkvm'],

  access: ['access-layer'],
  opt:    ['opt-vault','opt-jetkvm']
};
function tog(key) {
  state[key] = !state[key];
  document.getElementById('tog-'+key).classList.toggle('on', state[key]);
  groups[key].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.opacity = state[key] ? '1' : '0.05';
  });
}
</script>
